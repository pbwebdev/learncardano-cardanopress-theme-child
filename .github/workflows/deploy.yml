# Deploys the theme to learncardano.io on SiteGround whenever main is updated.
# Triggered by direct pushes to main and by PR merges into main.
name: Deploy theme to SiteGround

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: rsync + clear caches
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp build version
        run: |
          SHA_SHORT=$(git rev-parse --short=7 HEAD)
          BUILD_DATE=$(git log -1 --format=%cs HEAD)
          cat > build-version.php <<PHP
          <?php
          // Auto-generated by .github/workflows/deploy.yml on each deploy.
          // Read by footer.php to display the build stamp.
          return [
              'sha'  => '${SHA_SHORT}',
              'date' => '${BUILD_DATE}',
          ];
          PHP
          echo "Stamped: ${BUILD_DATE} · ${SHA_SHORT}"

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SITEGROUND_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SITEGROUND_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy via rsync
        env:
          SSH_HOST: ${{ secrets.SITEGROUND_SSH_HOST }}
          SSH_USER: ${{ secrets.SITEGROUND_SSH_USER }}
          SSH_PORT: ${{ secrets.SITEGROUND_SSH_PORT }}
          REMOTE_PATH: ${{ secrets.SITEGROUND_REMOTE_PATH }}
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='README.md' \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${SSH_PORT} -o UserKnownHostsFile=~/.ssh/known_hosts" \
            ./ "${SSH_USER}@${SSH_HOST}:${REMOTE_PATH}/"

      - name: Clear WordPress caches on server
        env:
          SSH_HOST: ${{ secrets.SITEGROUND_SSH_HOST }}
          SSH_USER: ${{ secrets.SITEGROUND_SSH_USER }}
          SSH_PORT: ${{ secrets.SITEGROUND_SSH_PORT }}
          REMOTE_PATH: ${{ secrets.SITEGROUND_REMOTE_PATH }}
          CACHE_DIR: ${{ secrets.CACHE_DIR }}
        run: |
          # WP root is REMOTE_PATH with the /wp-content/... suffix stripped.
          WP_ROOT="${REMOTE_PATH%/wp-content/*}"
          ssh -i ~/.ssh/id_ed25519 -p "${SSH_PORT}" -o UserKnownHostsFile=~/.ssh/known_hosts \
            "${SSH_USER}@${SSH_HOST}" "bash -s" <<EOSSH
          set -e
          export TERM=dumb
          # Asset CleanUp + SG Optimizer disk caches (covers regenerated bundles
          # and any leftover files SG's wp-cli command misses).
          rm -rf "${CACHE_DIR}asset-cleanup" "${CACHE_DIR}sgo-cache" 2>/dev/null || true
          # SG Optimizer one-shot: clears its assets folder, file cache, dynamic
          # cache, memcached, and PHP opcache in one call.
          cd "${WP_ROOT}"
          wp sg purge 2>&1 | sed 's/^/[wp sg purge] /'
          EOSSH

      - name: Purge Cloudflare cache
        uses: jakejarvis/cloudflare-purge-action@master
        env:
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE }}
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}

# Deploys the theme to learncardano.io on SiteGround whenever main is updated.
# Triggered by direct pushes to main and by PR merges into main.
name: Deploy theme to SiteGround

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: rsync to learncardano.io
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SITEGROUND_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SITEGROUND_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy via rsync
        env:
          SSH_HOST: ${{ secrets.SITEGROUND_SSH_HOST }}
          SSH_USER: ${{ secrets.SITEGROUND_SSH_USER }}
          SSH_PORT: ${{ secrets.SITEGROUND_SSH_PORT }}
          REMOTE_PATH: ${{ secrets.SITEGROUND_REMOTE_PATH }}
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='README.md' \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${SSH_PORT} -o UserKnownHostsFile=~/.ssh/known_hosts" \
            ./ "${SSH_USER}@${SSH_HOST}:${REMOTE_PATH}/"
